# Set a consistent pointer acceleration on every real mouse, on every machine.
#
# Matches any pointer that is NOT a touchpad, so plugged-in mice (wired or
# wireless) get the same feel without touching laptop touchpads. Applied by
# the X server at device-add time, so it covers hot-plugged devices too and
# survives reboots/replug — no per-device xinput IDs to chase.
#
# AccelSpeed ranges -1.0 (slowest) .. 1.0 (fastest). This is the persistent
# equivalent of: xinput --set-prop <id> 'libinput Accel Speed' -0.7
#
# Numbered 60- so it is parsed after the system default 40-libinput.conf and
# wins on the AccelSpeed option. Installed to /etc/X11/xorg.conf.d/ by setup.sh
# (it is a system path, so it cannot be a $HOME symlink like the other dotfiles).
Section "InputClass"
    Identifier "mouse accel speed"
    MatchIsPointer "on"
    MatchIsTouchpad "off"
    Driver "libinput"
    Option "AccelSpeed" "-0.7"
EndSection
